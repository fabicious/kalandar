{% extends "base.html" %}
{% block title %}Kalandar - Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Kalandar</h3>
                <form method="POST">
                    <div class="mb-3">
                        <input type="password" class="form-control" name="password" placeholder="Password" autofocus required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enter</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
