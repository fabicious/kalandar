{% extends "base.html" %}
{% block title %}Kalandar - Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5" style="border-color: var(--border-gold);">
            <div class="card-body text-center py-5">
                <h2 class="card-title mb-2" style="font-size: 2rem;">Kalandar</h2>
                <p class="text-muted mb-4" style="font-style: italic;">Speak the word and enter</p>
                <form method="POST">
                    <div class="mb-3">
                        <input type="password" class="form-control text-center" name="password" placeholder="Password" autofocus required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enter</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
